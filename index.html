<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계지도 위 위치 표시</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {            
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background-color: #f0f0f0;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover { background-color: #0056b3; }
    #result { font-family: sans-serif; font-size: 14px; }
    canvas {
      border: 2px solid #333;
      max-width: 100%; /* 화면보다 크면 자동으로 줄여서 보여줌 */
      height: auto;
      background-color: white;
    }
  </style>
</head>
<body>

  <button id="getLocation">내 위치 가져오기</button>
  <div id="result">위치 버튼을 눌러주세요.</div>
  
  <!-- 이미지 파일명을 실제 파일명과 일치시켜주세요 -->
  <img id="sourceImage" src="./image_b32c8814%20(1).png" style="display:none;">
  <canvas id="myCanvas"></canvas>

  <script>
    const getLocationBtn = document.getElementById('getLocation');
    const resultDiv = document.getElementById('result');
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const img = document.getElementById('sourceImage');

    getLocationBtn.addEventListener('click', function() {
      if (navigator.geolocation) {
        resultDiv.innerText = "위치를 찾는 중...";
        navigator.geolocation.getCurrentPosition(showPosition, errorPosition, {
          enableHighAccuracy: true
        });
      } else {
        alert('지오로케이션을 지원하지 않습니다.');
      }
    });

    function showPosition(position) {
      const lat = position.coords.latitude;  // 위도
      const lon = position.coords.longitude; // 경도

      resultDiv.innerHTML = `<b>위도:</b> ${lat.toFixed(4)}, <b>경도:</b> ${lon.toFixed(4)}`;

      // 이미지 로드 여부 확인 후 그리기
      if (img.complete) {
        drawLocation(lat, lon);
      } else {
        img.onload = () => drawLocation(lat, lon);
      }
    }

    function drawLocation(lat, lon) {
      // 1. 캔버스 크기를 1800x900으로 고정
      canvas.width = 1800;
      canvas.height = 900;

      // 2. 이미지 그리기
      ctx.drawImage(img, 0, 0, 1800, 900);

      // 3. 세계지도 좌표 변환 공식 (1800x900 기준)
      // 경도(X): -180~180을 0~1800으로 매핑
      const x = (lon + 180) * (1800 / 360);
      // 위도(Y): 90~-90을 0~900으로 매핑 (지도는 위가 북극이므로 90에서 뺌)
      const y = (90 - lat) * (900 / 180);

      // 4. 빨간색 원 그리기
      ctx.fillStyle = 'red';
      ctx.shadowBlur = 10;
      ctx.shadowColor = "black";
      ctx.beginPath();
      ctx.arc(x, y, 10, 0, Math.PI * 2); // 반지름 10
      ctx.fill();

      console.log(`그려진 좌표: X=${x.toFixed(2)}, Y=${y.toFixed(2)}`);
    }

    function errorPosition(err) {
      resultDiv.innerText = "오류 발생: " + err.message;
    }
  </script>
</body>
</html>
